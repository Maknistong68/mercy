<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Mercy — AI-powered image analysis for Industrial Engineering">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mercy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Offline Banner -->
  <div id="offlineBanner" class="offline-banner">No internet connection</div>

  <!-- API Key Setup (only for local/file:// usage) -->
  <div id="setup" class="setup-screen" style="display:none;">
    <h1>Mercy</h1>
    <p>Enter your OpenAI API key to get started</p>
    <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
    <button id="saveKeyBtn">Save & Start</button>
    <div id="setupError" class="error"></div>
  </div>

  <!-- Main Controller -->
  <div id="controller" class="controller" style="display:none;">
    <div class="status-bar">
      <div class="status-indicator">
        <div id="statusDot" class="status-dot"></div>
        <span id="statusText" class="status-text">Starting camera...</span>
      </div>
      <span id="statusAction" class="status-action"></span>
    </div>

    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div id="flash" class="capture-flash"></div>
      <button id="captureBtn" class="capture-btn" aria-label="Capture and analyze">
        <div class="capture-btn-ring">
          <div class="capture-btn-inner"></div>
        </div>
      </button>
    </div>

    <div id="inlineAnswer" class="inline-answer">
      <div class="answer-content" id="inlineAnswerText"></div>
    </div>

    <div class="instructions">
      Press <kbd>SPACE</kbd> or tap the button to capture and analyze
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    (() => {
      // ── Safe localStorage ──
      function storageGet(key) {
        try { return localStorage.getItem(key); } catch { return null; }
      }
      function storageSet(key, val) {
        try { localStorage.setItem(key, val); } catch {}
      }
      function storageRemove(key) {
        try { localStorage.removeItem(key); } catch {}
      }

      // ── Detect deployment mode ──
      const isServer = location.protocol === 'https:' || location.protocol === 'http:';

      // ── IE-focused prompt (same as api/analyze.js) ──
      const SYSTEM_PROMPT = 'You are an expert in Industrial Engineering and all related fields: operations research, quality management & control, statistics, probability, ergonomics, human factors, supply chain management, logistics, production planning & control, engineering economics, manufacturing processes, facilities planning & layout, work study, methods engineering, time & motion study, inventory management, lean manufacturing, Six Sigma, project management, engineering mathematics, thermodynamics, and material science.\n\nYou will be shown an image containing one or more multiple choice questions. Your task:\n1. Identify each question. Number them Q1, Q2, etc.\n2. Determine the correct answer using the EXACT choice label as written in the image. Do NOT convert labels — if choices are labeled 1, 2, 3, 4 use those numbers. If A, B, C, D use those letters. If True/False use that. Whatever the labeling is, use it exactly.\n3. Give a brief explanation (1-2 sentences) for each.\n\nSTRICT OUTPUT FORMAT — follow exactly:\nQ1: [exact choice label]\nExplanation: [brief reason]\n\nQ2: [exact choice label]\nExplanation: [brief reason]\n\nIf you cannot determine the answer with certainty, still provide your best choice and note your uncertainty in the explanation.';

      const USER_PROMPT = 'Analyze this image. Identify all multiple choice questions and provide the correct answers following the format specified.';

      const VERIFICATION_ROUNDS = 3;

      // ── State ──
      let apiKey = '';
      let isProcessing = false;
      let cameraStream = null;
      let healthCheckTimer = null;
      let abortController = null;
      let wakeLock = null;

      // ── BroadcastChannel ──
      let channel = null;
      try {
        channel = new BroadcastChannel('mercy_channel');
      } catch {}

      // ── DOM refs ──
      const setupEl = document.getElementById('setup');
      const controllerEl = document.getElementById('controller');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const saveKeyBtn = document.getElementById('saveKeyBtn');
      const setupError = document.getElementById('setupError');
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const flash = document.getElementById('flash');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const statusAction = document.getElementById('statusAction');
      const inlineAnswer = document.getElementById('inlineAnswer');
      const inlineAnswerText = document.getElementById('inlineAnswerText');
      const captureBtn = document.getElementById('captureBtn');
      const offlineBanner = document.getElementById('offlineBanner');

      // ── Init ──
      function init() {
        if (isServer) {
          showController();
        } else {
          apiKey = storageGet('mercy_api_key') || '';
          if (apiKey) showController();
          else showSetup();
        }

        document.addEventListener('visibilitychange', handleVisibility);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        if (!navigator.onLine) handleOffline();

        window.addEventListener('orientationchange', handleOrientation);
        if (screen.orientation) {
          screen.orientation.addEventListener('change', handleOrientation);
        }
        window.addEventListener('resize', handleResize);

        window.addEventListener('error', (e) => { console.error('Unhandled error:', e.error); });
        window.addEventListener('unhandledrejection', (e) => { console.error('Unhandled rejection:', e.reason); });
      }

      // ── Visibility ──
      function handleVisibility() {
        if (setupEl.style.display !== 'none') return;
        if (document.hidden) {
          if (cameraStream) cameraStream.getVideoTracks().forEach(t => { t.enabled = false; });
          releaseWakeLock();
        } else {
          if (cameraStream) {
            const tracks = cameraStream.getVideoTracks();
            if (tracks.length > 0 && tracks[0].readyState === 'live') {
              tracks.forEach(t => { t.enabled = true; });
              setStatus('ready', 'Ready');
            } else {
              reconnectCamera();
            }
          } else {
            reconnectCamera();
          }
          requestWakeLock();
        }
      }

      // ── Online / Offline ──
      function handleOnline() {
        offlineBanner.classList.remove('visible');
        if (controllerEl.style.display !== 'none' && !isProcessing) {
          setStatus('ready', 'Ready');
          statusAction.textContent = 'Press SPACE or tap to capture';
        }
      }

      function handleOffline() {
        offlineBanner.classList.add('visible');
        if (controllerEl.style.display !== 'none' && !isProcessing) {
          setStatus('error', 'No internet connection');
          statusAction.textContent = '';
        }
      }

      // ── Orientation ──
      let orientationTimer = null;
      function handleOrientation() {
        clearTimeout(orientationTimer);
        orientationTimer = setTimeout(() => {
          if (cameraStream && !isProcessing && controllerEl.style.display !== 'none') {
            reconnectCamera();
          }
        }, 500);
      }

      let resizeTimer = null;
      function handleResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          document.body.classList.toggle('landscape', window.innerWidth > window.innerHeight);
        }, 200);
      }

      // ── Wake Lock ──
      async function requestWakeLock() {
        try {
          if ('wakeLock' in navigator && document.visibilityState === 'visible') {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => { wakeLock = null; });
          }
        } catch {}
      }
      function releaseWakeLock() {
        try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch {}
      }

      // ── Setup Screen (local mode) ──
      function showSetup() {
        setupEl.style.display = 'flex';
        controllerEl.style.display = 'none';
        stopCamera();
        apiKeyInput.focus();
      }

      saveKeyBtn.addEventListener('click', saveKey);
      apiKeyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveKey(); });

      function saveKey() {
        const key = apiKeyInput.value.trim();
        if (!key) { setupError.textContent = 'Please enter an API key.'; return; }
        storageSet('mercy_api_key', key);
        apiKey = key;
        setupError.textContent = '';
        showController();
      }

      // ── Controller ──
      function showController() {
        setupEl.style.display = 'none';
        controllerEl.style.display = 'flex';
        document.body.classList.toggle('landscape', window.innerWidth > window.innerHeight);
        startCamera();
        startHealthCheck();
      }

      // ── Camera: request highest possible resolution ──
      async function startCamera(retries = 3) {
        setStatus('starting', 'Starting camera...');
        statusAction.textContent = '';

        for (let attempt = 0; attempt < retries; attempt++) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: 'environment',
                width: { ideal: 4096 },
                height: { ideal: 2160 }
              },
              audio: false
            });
            cameraStream = stream;
            video.srcObject = stream;
            await waitForVideo();
            setStatus('ready', 'Ready (' + video.videoWidth + 'x' + video.videoHeight + ')');
            statusAction.textContent = 'Press SPACE or tap to capture';
            requestWakeLock();
            return;
          } catch (err) {
            if (err.name === 'NotAllowedError') {
              setStatus('error', 'Camera blocked — allow camera access in browser settings, then reload.');
              return;
            }
            if (err.name === 'OverconstrainedError') {
              try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                cameraStream = stream;
                video.srcObject = stream;
                await waitForVideo();
                setStatus('ready', 'Ready (' + video.videoWidth + 'x' + video.videoHeight + ')');
                statusAction.textContent = 'Press SPACE or tap to capture';
                requestWakeLock();
                return;
              } catch {}
            }
            if (err.name === 'NotReadableError') {
              if (attempt < retries - 1) {
                setStatus('starting', 'Camera busy — retrying (' + (attempt + 2) + '/' + retries + ')...');
                await sleep(2000 * (attempt + 1));
                continue;
              }
            }
            if (attempt < retries - 1) {
              setStatus('starting', 'Camera retry ' + (attempt + 2) + '/' + retries + '...');
              await sleep(1000 * (attempt + 1));
            } else {
              setStatus('error', 'Camera error: ' + err.message);
            }
          }
        }
      }

      function waitForVideo() {
        return new Promise((resolve, reject) => {
          if (video.readyState >= 2 && video.videoWidth > 0) return resolve();
          const onReady = () => { cleanup(); resolve(); };
          const onError = () => { cleanup(); reject(new Error('Video failed to load')); };
          const timer = setTimeout(() => { cleanup(); reject(new Error('Video load timeout')); }, 10000);
          function cleanup() {
            clearTimeout(timer);
            video.removeEventListener('loadeddata', onReady);
            video.removeEventListener('error', onError);
          }
          video.addEventListener('loadeddata', onReady);
          video.addEventListener('error', onError);
        });
      }

      function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

      function stopCamera() {
        if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
        video.srcObject = null;
        releaseWakeLock();
      }

      async function reconnectCamera() { stopCamera(); await startCamera(); }

      // ── Health Check ──
      function startHealthCheck() {
        if (healthCheckTimer) clearInterval(healthCheckTimer);
        healthCheckTimer = setInterval(() => {
          if (!cameraStream || isProcessing) return;
          const tracks = cameraStream.getVideoTracks();
          if (tracks.length === 0 || tracks[0].readyState === 'ended') reconnectCamera();
        }, 30000);
      }

      // ── Status ──
      function setStatus(type, text) {
        statusDot.className = 'status-dot';
        if (type === 'error') statusDot.classList.add('error');
        if (type === 'processing' || type === 'starting') statusDot.classList.add('processing');
        statusText.textContent = text;
      }

      // ── Broadcast ──
      function broadcast(data) {
        try { if (channel) channel.postMessage(data); } catch {}
        storageSet('mercy_broadcast', JSON.stringify({ ...data, _ts: Date.now() }));
        storageRemove('mercy_broadcast');

        if (data.type === 'loading') {
          inlineAnswer.classList.add('visible');
          inlineAnswerText.textContent = 'Analyzing & verifying (3 rounds)...';
        } else if (data.type === 'answer' || data.type === 'error') {
          inlineAnswer.classList.add('visible');
          let text = data.answer || data.error || '';
          if (data.confidence && data.confidence.summary) {
            text += '\n\n[' + data.confidence.summary + ']';
          }
          inlineAnswerText.textContent = text;
        }
      }

      // ── Capture Frame (with orientation correction) ──
      function captureFrame() {
        if (video.readyState < 2 || video.videoWidth === 0 || video.videoHeight === 0) {
          throw new Error('Camera not ready — wait a moment and try again.');
        }

        // Check for rotation metadata from the video track
        let rotation = 0;
        try {
          const track = cameraStream.getVideoTracks()[0];
          const settings = track.getSettings();
          if (typeof settings.rotation === 'number') rotation = settings.rotation;
        } catch {}

        const isRotated = (rotation === 90 || rotation === 270);

        if (isRotated) {
          canvas.width = video.videoHeight;
          canvas.height = video.videoWidth;
        } else {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }

        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('Canvas unavailable — try reloading the page.');

        if (rotation !== 0) {
          ctx.save();
          ctx.translate(canvas.width / 2, canvas.height / 2);
          ctx.rotate(-rotation * Math.PI / 180);
          ctx.drawImage(video, -video.videoWidth / 2, -video.videoHeight / 2);
          ctx.restore();
        } else {
          ctx.drawImage(video, 0, 0);
        }

        return canvas.toDataURL('image/jpeg', 0.92);
      }

      function flashScreen() {
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 120);
      }

      // ── Answer parsing (for local-mode verification) ──
      function parseAnswers(text) {
        const matches = [...text.matchAll(/Q(\d+):\s*(.+)/gi)];
        const map = {};
        for (const m of matches) {
          let choice = m[2].trim();
          const explIdx = choice.toLowerCase().indexOf('explanation');
          if (explIdx > 0) choice = choice.substring(0, explIdx).trim();
          choice = choice.replace(/[.,;:\-]+$/, '').trim();
          map['Q' + m[1]] = choice.toUpperCase();
        }
        return map;
      }

      function computeConsensus(successful) {
        const parsed = successful.map(parseAnswers);
        const allKeys = [...new Set(parsed.flatMap(p => Object.keys(p)))].sort(
          (a, b) => parseInt(a.slice(1)) - parseInt(b.slice(1))
        );

        let agreedCount = 0;
        const details = {};

        for (const key of allKeys) {
          const votes = parsed.map(p => p[key]).filter(Boolean);
          const tally = {};
          for (const v of votes) tally[v] = (tally[v] || 0) + 1;
          const sorted = Object.entries(tally).sort((a, b) => b[1] - a[1]);
          const [bestChoice, bestCount] = sorted[0];
          const unanimous = bestCount === votes.length;
          details[key] = { choice: bestChoice, votes: bestCount, total: votes.length, unanimous };
          if (unanimous) agreedCount++;
        }

        // Pick best matching response
        let bestIdx = 0;
        let bestMatchCount = 0;
        for (let i = 0; i < successful.length; i++) {
          let matchCount = 0;
          for (const key of allKeys) {
            if (parsed[i][key] === details[key].choice) matchCount++;
          }
          if (matchCount > bestMatchCount) { bestMatchCount = matchCount; bestIdx = i; }
        }

        const totalQuestions = allKeys.length;
        const roundsCompleted = successful.length;
        const perQuestion = allKeys.map(key => {
          const d = details[key];
          return key + ': ' + d.choice + ' (' + d.votes + '/' + d.total + ' — ' + (d.unanimous ? 'verified' : 'review') + ')';
        }).join('\n');

        const summary = totalQuestions > 0
          ? agreedCount + '/' + totalQuestions + ' verified (' + roundsCompleted + ' rounds)'
          : roundsCompleted + ' rounds completed';

        return {
          bestResponse: successful[bestIdx],
          confidence: { summary, perQuestion, agreedCount, totalQuestions, roundsCompleted, details }
        };
      }

      // ── API call with verification ──
      async function analyzeImage(base64Url) {
        abortController = new AbortController();
        const timeoutId = setTimeout(() => abortController.abort(), 90000);

        try {
          if (isServer) {
            // ── Vercel mode: server handles verification ──
            const response = await fetch('/api/analyze', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              signal: abortController.signal,
              body: JSON.stringify({ image: base64Url })
            });

            clearTimeout(timeoutId);

            let data;
            try { data = await response.json(); } catch {
              throw new Error('Invalid response from server — try again.');
            }

            if (!response.ok) throw new Error(data.error || 'Server error (' + response.status + ')');
            if (!data.answer) throw new Error('Empty response — try again.');

            return { answer: data.answer, confidence: data.confidence };

          } else {
            // ── Local mode: 3-round parallel verification ──
            const requestBody = {
              model: 'gpt-4o',
              max_tokens: 4096,
              messages: [
                { role: 'system', content: SYSTEM_PROMPT },
                {
                  role: 'user',
                  content: [
                    { type: 'text', text: USER_PROMPT },
                    { type: 'image_url', image_url: { url: base64Url, detail: 'high' } }
                  ]
                }
              ]
            };

            const promises = Array.from({ length: VERIFICATION_ROUNDS }, () =>
              fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + apiKey
                },
                signal: abortController.signal,
                body: JSON.stringify(requestBody)
              }).then(async (response) => {
                if (response.status === 401) {
                  storageRemove('mercy_api_key');
                  throw new Error('API key invalid. Reload to enter a new key.');
                }
                if (response.status === 429) throw new Error('Rate limited — wait a moment, then try again.');
                if (!response.ok) {
                  let body = ''; try { body = await response.text(); } catch {}
                  throw new Error('API error (' + response.status + '): ' + body.slice(0, 200));
                }
                let data;
                try { data = await response.json(); } catch { throw new Error('Invalid API response'); }
                const content = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
                if (!content) throw new Error('Empty response');
                return content;
              }).catch(err => ({ error: err.message }))
            );

            const results = await Promise.all(promises);
            clearTimeout(timeoutId);

            // Check for fatal errors
            for (const r of results) {
              if (r && r.error && r.error.includes('API key invalid')) throw new Error(r.error);
            }

            const successful = results.filter(r => typeof r === 'string' && r.length > 0);
            if (successful.length === 0) {
              const firstErr = results.find(r => r && r.error);
              throw new Error('All verification rounds failed.' + (firstErr ? ' ' + firstErr.error : ''));
            }

            const { bestResponse, confidence } = computeConsensus(successful);
            return { answer: bestResponse, confidence };
          }
        } catch (err) {
          clearTimeout(timeoutId);
          if (err.name === 'AbortError') throw new Error('Request timed out — check your connection and try again.');
          throw err;
        } finally {
          abortController = null;
        }
      }

      // ── Capture handler ──
      async function handleCapture() {
        if (isProcessing) return;
        if (!navigator.onLine) { setStatus('error', 'No internet connection'); statusAction.textContent = ''; return; }
        if (!cameraStream || cameraStream.getVideoTracks()[0]?.readyState === 'ended') {
          setStatus('error', 'Camera not available — reconnecting...');
          reconnectCamera();
          return;
        }

        isProcessing = true;
        captureBtn.classList.add('disabled');
        flashScreen();
        setStatus('processing', 'Analyzing & verifying (3 rounds)...');
        statusAction.textContent = '';
        broadcast({ type: 'loading' });

        try {
          const frame = captureFrame();
          const { answer, confidence } = await analyzeImage(frame);

          broadcast({
            type: 'answer',
            answer: answer,
            confidence: confidence,
            timestamp: new Date().toLocaleTimeString()
          });
          setStatus('ready', 'Ready');
          statusAction.textContent = 'Press SPACE or tap to capture';
        } catch (err) {
          const msg = err.message || 'Unknown error';
          broadcast({ type: 'error', error: msg });
          setStatus('error', msg);
          statusAction.textContent = 'Tap or press SPACE to retry';

          if (!isServer && msg.includes('API key invalid')) {
            apiKey = '';
            setTimeout(showSetup, 2000);
          }
        } finally {
          isProcessing = false;
          captureBtn.classList.remove('disabled');
        }
      }

      // ── Input handlers ──
      document.addEventListener('keydown', (e) => {
        if (e.code !== 'Space') return;
        if (setupEl.style.display !== 'none') return;
        e.preventDefault();
        handleCapture();
      });

      captureBtn.addEventListener('click', (e) => {
        e.preventDefault();
        handleCapture();
      });

      // ── Start ──
      init();
    })();
  </script>
</body>
</html>
