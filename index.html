<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Mercy — AI-powered image analysis using your camera">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mercy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Offline Banner -->
  <div id="offlineBanner" class="offline-banner">No internet connection</div>

  <!-- API Key Setup (shown only on first use) -->
  <div id="setup" class="setup-screen" style="display:none;">
    <h1>Mercy</h1>
    <p>Enter your OpenAI API key to get started</p>
    <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
    <button id="saveKeyBtn">Save & Start</button>
    <div id="setupError" class="error"></div>
  </div>

  <!-- Main Controller -->
  <div id="controller" class="controller" style="display:none;">
    <div class="status-bar">
      <div class="status-indicator">
        <div id="statusDot" class="status-dot"></div>
        <span id="statusText" class="status-text">Starting camera...</span>
      </div>
      <span id="statusAction" class="status-action"></span>
    </div>

    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div id="flash" class="capture-flash"></div>
      <button id="captureBtn" class="capture-btn" aria-label="Capture and analyze">
        <div class="capture-btn-ring">
          <div class="capture-btn-inner"></div>
        </div>
      </button>
    </div>

    <div id="inlineAnswer" class="inline-answer">
      <div class="answer-content" id="inlineAnswerText"></div>
    </div>

    <div class="instructions">
      Press <kbd>SPACE</kbd> or tap the button to capture and analyze
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    (() => {
      // ── Safe localStorage ──
      function storageGet(key) {
        try { return localStorage.getItem(key); } catch { return null; }
      }
      function storageSet(key, val) {
        try { localStorage.setItem(key, val); } catch {}
      }
      function storageRemove(key) {
        try { localStorage.removeItem(key); } catch {}
      }

      // ── State ──
      let apiKey = '';
      let isProcessing = false;
      let answerWindow = null;
      let popupBlocked = false;
      let cameraStream = null;
      let healthCheckTimer = null;
      let abortController = null;
      let wakeLock = null;

      // ── DOM refs ──
      const setupEl = document.getElementById('setup');
      const controllerEl = document.getElementById('controller');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const saveKeyBtn = document.getElementById('saveKeyBtn');
      const setupError = document.getElementById('setupError');
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const flash = document.getElementById('flash');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const statusAction = document.getElementById('statusAction');
      const inlineAnswer = document.getElementById('inlineAnswer');
      const inlineAnswerText = document.getElementById('inlineAnswerText');
      const captureBtn = document.getElementById('captureBtn');
      const offlineBanner = document.getElementById('offlineBanner');

      // ── PostMessage origin ──
      const msgOrigin = location.protocol === 'file:' ? '*' : location.origin;

      // ── Init ──
      function init() {
        apiKey = storageGet('mercy_api_key') || '';
        if (apiKey) {
          showController();
        } else {
          showSetup();
        }

        // Visibility: pause camera when tab hidden, resume when visible
        document.addEventListener('visibilitychange', handleVisibility);

        // Online/offline detection
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        if (!navigator.onLine) handleOffline();

        // Orientation change: reconnect camera to adapt resolution
        window.addEventListener('orientationchange', handleOrientation);
        if (screen.orientation) {
          screen.orientation.addEventListener('change', handleOrientation);
        }
        window.addEventListener('resize', handleResize);

        // Global error handler
        window.addEventListener('error', (e) => {
          console.error('Unhandled error:', e.error);
        });
        window.addEventListener('unhandledrejection', (e) => {
          console.error('Unhandled rejection:', e.reason);
        });
      }

      // ── Visibility handling ──
      function handleVisibility() {
        if (setupEl.style.display !== 'none') return;

        if (document.hidden) {
          // Disable tracks to save battery (don't fully stop — faster resume)
          if (cameraStream) {
            cameraStream.getVideoTracks().forEach(t => { t.enabled = false; });
          }
          releaseWakeLock();
        } else {
          // Re-enable or reconnect
          if (cameraStream) {
            const tracks = cameraStream.getVideoTracks();
            if (tracks.length > 0 && tracks[0].readyState === 'live') {
              tracks.forEach(t => { t.enabled = true; });
              setStatus('ready', 'Ready');
            } else {
              reconnectCamera();
            }
          } else {
            reconnectCamera();
          }
          requestWakeLock();
        }
      }

      // ── Online / Offline ──
      function handleOnline() {
        offlineBanner.classList.remove('visible');
        if (controllerEl.style.display !== 'none' && !isProcessing) {
          setStatus('ready', 'Ready');
          statusAction.textContent = 'Press SPACE or tap to capture';
        }
      }

      function handleOffline() {
        offlineBanner.classList.add('visible');
        if (controllerEl.style.display !== 'none' && !isProcessing) {
          setStatus('error', 'No internet connection');
          statusAction.textContent = '';
        }
      }

      // ── Orientation change ──
      let orientationTimer = null;
      function handleOrientation() {
        // Debounce: camera re-acquisition after rotation settles
        clearTimeout(orientationTimer);
        orientationTimer = setTimeout(() => {
          if (cameraStream && !isProcessing && controllerEl.style.display !== 'none') {
            reconnectCamera();
          }
        }, 500);
      }

      // ── Resize handler (covers orientation + window resizing on DeX) ──
      let resizeTimer = null;
      function handleResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          // Update body class for layout detection
          document.body.classList.toggle('landscape', window.innerWidth > window.innerHeight);
        }, 200);
      }

      // ── Wake Lock (prevent screen sleep) ──
      async function requestWakeLock() {
        try {
          if ('wakeLock' in navigator && document.visibilityState === 'visible') {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => { wakeLock = null; });
          }
        } catch {}
      }

      function releaseWakeLock() {
        try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch {}
      }

      // ── Setup Screen ──
      function showSetup() {
        setupEl.style.display = 'flex';
        controllerEl.style.display = 'none';
        stopCamera();
        apiKeyInput.focus();
      }

      saveKeyBtn.addEventListener('click', saveKey);
      apiKeyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') saveKey();
      });

      function saveKey() {
        const key = apiKeyInput.value.trim();
        if (!key) {
          setupError.textContent = 'Please enter an API key.';
          return;
        }
        storageSet('mercy_api_key', key);
        apiKey = key;
        setupError.textContent = '';
        showController();
      }

      // ── Controller ──
      function showController() {
        setupEl.style.display = 'none';
        controllerEl.style.display = 'flex';
        document.body.classList.toggle('landscape', window.innerWidth > window.innerHeight);
        startCamera();
        openAnswerWindow();
        startHealthCheck();
      }

      // ── Camera with retry ──
      async function startCamera(retries = 3) {
        setStatus('starting', 'Starting camera...');
        statusAction.textContent = '';

        for (let attempt = 0; attempt < retries; attempt++) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: 'environment',
                width: { ideal: 1920 },
                height: { ideal: 1080 }
              },
              audio: false
            });
            cameraStream = stream;
            video.srcObject = stream;

            // Wait for video metadata to load so dimensions are available
            await waitForVideo();

            setStatus('ready', 'Ready');
            statusAction.textContent = 'Press SPACE or tap to capture';
            requestWakeLock();
            return;
          } catch (err) {
            if (err.name === 'NotAllowedError') {
              setStatus('error', 'Camera blocked — allow camera access in browser settings, then reload.');
              return; // Don't retry permission errors
            }

            if (err.name === 'OverconstrainedError') {
              // Fallback: try without specific resolution/facing constraints
              try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                cameraStream = stream;
                video.srcObject = stream;
                await waitForVideo();
                setStatus('ready', 'Ready');
                statusAction.textContent = 'Press SPACE or tap to capture';
                requestWakeLock();
                return;
              } catch {
                // Fall through to retry
              }
            }

            if (err.name === 'NotReadableError') {
              // Camera in use by another app — wait longer before retry
              if (attempt < retries - 1) {
                setStatus('starting', 'Camera busy — retrying (' + (attempt + 2) + '/' + retries + ')...');
                await sleep(2000 * (attempt + 1));
                continue;
              }
            }

            if (attempt < retries - 1) {
              setStatus('starting', 'Camera retry ' + (attempt + 2) + '/' + retries + '...');
              await sleep(1000 * (attempt + 1));
            } else {
              setStatus('error', 'Camera error: ' + err.message);
            }
          }
        }
      }

      function waitForVideo() {
        return new Promise((resolve, reject) => {
          if (video.readyState >= 2 && video.videoWidth > 0) {
            return resolve();
          }
          const onReady = () => {
            cleanup();
            resolve();
          };
          const onError = () => {
            cleanup();
            reject(new Error('Video failed to load'));
          };
          const timer = setTimeout(() => {
            cleanup();
            reject(new Error('Video load timeout'));
          }, 10000);

          function cleanup() {
            clearTimeout(timer);
            video.removeEventListener('loadeddata', onReady);
            video.removeEventListener('error', onError);
          }
          video.addEventListener('loadeddata', onReady);
          video.addEventListener('error', onError);
        });
      }

      function sleep(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      function stopCamera() {
        if (cameraStream) {
          cameraStream.getTracks().forEach(t => t.stop());
          cameraStream = null;
        }
        video.srcObject = null;
        releaseWakeLock();
      }

      async function reconnectCamera() {
        stopCamera();
        await startCamera();
      }

      // ── Health Check ──
      function startHealthCheck() {
        if (healthCheckTimer) clearInterval(healthCheckTimer);
        healthCheckTimer = setInterval(() => {
          if (!cameraStream || isProcessing) return;
          const tracks = cameraStream.getVideoTracks();
          if (tracks.length === 0 || tracks[0].readyState === 'ended') {
            reconnectCamera();
          }
        }, 30000);
      }

      // ── Status ──
      function setStatus(type, text) {
        statusDot.className = 'status-dot';
        if (type === 'error') statusDot.classList.add('error');
        if (type === 'processing') statusDot.classList.add('processing');
        if (type === 'starting') statusDot.classList.add('processing');
        statusText.textContent = text;
      }

      // ── Answer Window ──
      function openAnswerWindow() {
        try {
          answerWindow = window.open('answer.html', 'MercyAnswer', 'width=800,height=600');
          if (!answerWindow || answerWindow.closed) {
            popupBlocked = true;
            statusAction.textContent = 'Pop-up blocked — answers shown inline';
          } else {
            popupBlocked = false;
          }
        } catch {
          popupBlocked = true;
        }
      }

      function ensureAnswerWindow() {
        if (popupBlocked) return;
        if (!answerWindow || answerWindow.closed) {
          openAnswerWindow();
        }
      }

      function sendToAnswer(data) {
        if (popupBlocked || !answerWindow || answerWindow.closed) {
          // Inline fallback
          if (data.type === 'loading') {
            inlineAnswer.classList.add('visible');
            inlineAnswerText.textContent = 'Analyzing...';
          } else {
            inlineAnswer.classList.add('visible');
            inlineAnswerText.textContent = data.answer || data.error || '';
          }
          return;
        }
        try {
          answerWindow.postMessage(data, msgOrigin);
        } catch {
          inlineAnswer.classList.add('visible');
          inlineAnswerText.textContent = data.answer || data.error || '';
        }
      }

      // ── Capture Frame ──
      function captureFrame() {
        if (video.readyState < 2 || video.videoWidth === 0 || video.videoHeight === 0) {
          throw new Error('Camera not ready — wait a moment and try again.');
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        if (!ctx) {
          throw new Error('Canvas unavailable — try reloading the page.');
        }
        ctx.drawImage(video, 0, 0);
        return canvas.toDataURL('image/jpeg', 0.85);
      }

      function flashScreen() {
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 120);
      }

      // ── OpenAI API with timeout ──
      async function analyzeImage(base64Url) {
        abortController = new AbortController();
        const timeoutId = setTimeout(() => abortController.abort(), 60000);

        try {
          const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + apiKey
            },
            signal: abortController.signal,
            body: JSON.stringify({
              model: 'gpt-4o',
              max_tokens: 4096,
              messages: [
                {
                  role: 'user',
                  content: [
                    {
                      type: 'text',
                      text: 'Find all questions/problems in this image. Provide ONLY the answers — clear, concise, and numbered if there are multiple. Do not restate the questions.'
                    },
                    {
                      type: 'image_url',
                      image_url: { url: base64Url, detail: 'high' }
                    }
                  ]
                }
              ]
            })
          });

          clearTimeout(timeoutId);

          if (response.status === 401) {
            storageRemove('mercy_api_key');
            throw new Error('API key invalid. Reload to enter a new key.');
          }

          if (response.status === 429) {
            throw new Error('Rate limited — wait a moment, then try again.');
          }

          if (response.status === 403) {
            throw new Error('Access denied — check your API key permissions.');
          }

          if (response.status >= 500) {
            throw new Error('OpenAI server error — try again in a moment.');
          }

          if (!response.ok) {
            let body = '';
            try { body = await response.text(); } catch {}
            throw new Error('API error (' + response.status + '): ' + body.slice(0, 200));
          }

          let data;
          try {
            data = await response.json();
          } catch {
            throw new Error('Invalid response from API — try again.');
          }

          if (!data.choices || !data.choices[0] || !data.choices[0].message || !data.choices[0].message.content) {
            throw new Error('Empty response from API — try again.');
          }

          return data.choices[0].message.content;
        } catch (err) {
          clearTimeout(timeoutId);
          if (err.name === 'AbortError') {
            throw new Error('Request timed out — check your connection and try again.');
          }
          throw err;
        } finally {
          abortController = null;
        }
      }

      // ── Shared capture handler (keyboard + touch) ──
      async function handleCapture() {
        if (isProcessing) return;

        if (!navigator.onLine) {
          setStatus('error', 'No internet connection');
          statusAction.textContent = '';
          return;
        }

        if (!cameraStream || cameraStream.getVideoTracks()[0]?.readyState === 'ended') {
          setStatus('error', 'Camera not available — reconnecting...');
          reconnectCamera();
          return;
        }

        isProcessing = true;
        captureBtn.classList.add('disabled');
        flashScreen();
        setStatus('processing', 'Analyzing...');
        statusAction.textContent = '';

        ensureAnswerWindow();
        sendToAnswer({ type: 'loading' });

        try {
          const frame = captureFrame();
          const answer = await analyzeImage(frame);

          sendToAnswer({ type: 'answer', answer: answer, timestamp: new Date().toLocaleTimeString() });
          setStatus('ready', 'Ready');
          statusAction.textContent = 'Press SPACE or tap to capture';
        } catch (err) {
          const msg = err.message || 'Unknown error';
          sendToAnswer({ type: 'error', error: msg });
          setStatus('error', msg);
          statusAction.textContent = 'Tap or press SPACE to retry';

          // If key was invalid, go back to setup
          if (msg.includes('API key invalid')) {
            apiKey = '';
            setTimeout(showSetup, 2000);
          }
        } finally {
          isProcessing = false;
          captureBtn.classList.remove('disabled');
        }
      }

      // ── Keyboard handler ──
      document.addEventListener('keydown', (e) => {
        if (e.code !== 'Space') return;
        if (setupEl.style.display !== 'none') return;
        e.preventDefault();
        handleCapture();
      });

      // ── Touch / click handler ──
      captureBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        handleCapture();
      });

      // Prevent double-tap zoom on capture button
      captureBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
      });

      // ── Start ──
      init();
    })();
  </script>
</body>
</html>
